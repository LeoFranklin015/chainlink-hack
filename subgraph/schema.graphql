type Token @entity {
  id: Bytes! # token address
  priceFeed: Bytes!
  transferLock: Bytes!
  supplyCap: BigInt!
  active: Boolean!
  positions: [Position!]! @derivedFrom(field: "token")
  trades: [Trade!]! @derivedFrom(field: "token")
}

type User @entity {
  id: Bytes! # wallet address
  verified: Boolean!
  positions: [Position!]! @derivedFrom(field: "user")
  trades: [Trade!]! @derivedFrom(field: "user")
}

type Position @entity {
  id: Bytes! # token address + user address
  token: Token!
  user: User!
  balance: BigInt!
  totalBought: BigInt!
  totalSold: BigInt!
  totalVolumeUSDC: BigInt!
  flagged: Boolean!
}

enum TradeType {
  BUY
  SELL
}

type Trade @entity(immutable: true) {
  id: Bytes!
  type: TradeType!
  token: Token!
  user: User!
  usdcAmount: BigInt!
  tokenAmount: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  transactionHash: Bytes!
}

type UserVerification @entity(immutable: true) {
  id: Bytes!
  user: Bytes!
  nullifierHash: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  transactionHash: Bytes!
}

type HoldingLimitEvent @entity(immutable: true) {
  id: Bytes!
  token: Bytes!
  holder: Bytes!
  flagged: Boolean!
  balance: BigInt
  totalSupply: BigInt
  blockNumber: BigInt!
  timestamp: BigInt!
  transactionHash: Bytes!
}

type CrossChainSupplyUpdate @entity(immutable: true) {
  id: Bytes!
  token: Bytes!
  crossChainSupply: BigInt!
  localSupply: BigInt!
  blockNumber: BigInt!
  timestamp: BigInt!
  transactionHash: Bytes!
}

type ExchangeStats @entity {
  id: String! # "stats"
  totalTrades: BigInt!
  totalVolumeUSDC: BigInt!
  totalBought: BigInt!
  totalSold: BigInt!
  tokenCount: BigInt!
  userCount: BigInt!
  verifiedUserCount: BigInt!
}
