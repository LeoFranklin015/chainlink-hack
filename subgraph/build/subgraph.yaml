specVersion: 1.0.0
indexerHints:
  prune: auto
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum
    name: MultiTokenExchange
    network: base-sepolia
    source:
      abi: MultiTokenExchange
      address: "0x06a26BCd49421952c8791cEf860c9824B6b45106"
      startBlock: 22998000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Token
        - User
        - Position
        - Trade
        - UserVerification
        - HoldingLimitEvent
        - CrossChainSupplyUpdate
        - ExchangeStats
      abis:
        - name: MultiTokenExchange
          file: MultiTokenExchange/MultiTokenExchange.json
      eventHandlers:
        - event: TokenAdded(indexed address,address,address,uint256)
          handler: handleTokenAdded
        - event: TokenRemoved(indexed address)
          handler: handleTokenRemoved
        - event: Buy(indexed address,indexed address,uint256,uint256)
          handler: handleBuy
        - event: Sell(indexed address,indexed address,uint256,uint256)
          handler: handleSell
        - event: UserVerified(indexed address,uint256)
          handler: handleUserVerified
        - event: HolderFlagged(indexed address,indexed address,uint256,uint256)
          handler: handleHolderFlagged
        - event: HolderUnflagged(indexed address,indexed address)
          handler: handleHolderUnflagged
        - event: CrossChainSupplyUpdated(indexed address,uint256,uint256)
          handler: handleCrossChainSupplyUpdated
      file: MultiTokenExchange/MultiTokenExchange.wasm
