# ==========================================================================
# CRE WORKFLOW SETTINGS FILE
# ==========================================================================
# XStocks Supply Sync — reads totalSupply from all chains and writes
# crossChainSupply to each chain's exchange so global supply cap is enforced.

# ==========================================================================
staging-settings:
  user-workflow:
    workflow-name: "xstocks-supply-sync-staging"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.json"
    secrets-path: ""

# ==========================================================================
production-settings:
  user-workflow:
    workflow-name: "xstocks-supply-sync-production"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.json"
    secrets-path: ""
